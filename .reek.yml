---
detectors:
  IrresponsibleModule:
    enabled: false
  UncommunicativeModuleName:
    accept:
      - "V1"
  MissingSafeMethod:
    enabled: false
  UtilityFunction:
    enabled: false
  InstanceVariableAssumption:
    enabled: false
  NilCheck:
    enabled: false
  ControlParameter:
    exclude:
      - "RecipeImporter#initialize"
      - "RecipeImporters::InstagramReelExtractor#initialize"
      - "Api::V1::CookbooksController#cookbook_json"
  ManualDispatch:
    exclude:
      - "Api::V1::RecipesController#validate_import_image"
  RepeatedConditional:
    exclude:
      - "Api::V1::CookbookInvitationsController"
  DuplicateMethodCall:
    exclude:
      - "RecipesController#create"
      - "RecipesController#update"
      - "RecipesController#recipe_params"
      - "RecipesController#index"
      - "Authentication#find_session_by_cookie"
      - "ShoppingList::UpsertItems#call"
      - "ShoppingList::UpsertItems#upsert_item"
      - "Api::V1::CookbookInvitationsController#create"
      - "Api::V1::CookbookInvitationsController#accept"
  TooManyStatements:
    max_statements: 10
    exclude:
      - "ShoppingList::UpsertItems#call"
      - "ShoppingList::UpsertItems#upsert_item"
  LongParameterList:
    exclude:
      - "ShoppingList::UpsertItems#upsert_item"
  FeatureEnvy:
    exclude:
      - "ShoppingList::UpsertItems#upsert_item"
      - "Api::V1::RecipesController#recipe_detail_json"
      - "Api::V1::RecipesController#recipe_list_json"
      - "Api::V1::RecipesController#decode_cursor"
      - "RecipesController#imported_recipe_params"
      - "RecipesController#recipe_params"
      - "RecipeImporters::JsonLdExtractor#find_recipe"
      - "RecipeImporters::JsonLdExtractor#extract_instructions"
      - "RecipeImporters::InstagramReelExtractor#sanitized_url"
      - "RecipeImporter#sanitized_url"
