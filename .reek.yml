---
detectors:
  IrresponsibleModule:
    enabled: false
  UncommunicativeModuleName:
    accept:
      - "V1"
  MissingSafeMethod:
    enabled: false
  UtilityFunction:
    enabled: false
  InstanceVariableAssumption:
    enabled: false
  NilCheck:
    enabled: false
  TooManyStatements:
    max_statements: 10
  ControlParameter:
    exclude:
      - "RecipeImporter#initialize"
      - "RecipeImporters::InstagramReelExtractor#initialize"
  DuplicateMethodCall:
    exclude:
      - "ShoppingList::UpsertItems#call"
      - "ShoppingList::UpsertItems#upsert_item"
  LongParameterList:
    exclude:
      - "ShoppingList::UpsertItems#upsert_item"
  FeatureEnvy:
    exclude:
      - "ShoppingList::UpsertItems#upsert_item"
      - "RecipeImporter#sanitized_url"
      - "RecipeImporters::InstagramReelExtractor#sanitized_url"

directories:
  "app/controllers":
    DuplicateMethodCall:
      enabled: false
    TooManyStatements:
      enabled: false
    TooManyInstanceVariables:
      enabled: false
    TooManyMethods:
      enabled: false
    FeatureEnvy:
      enabled: false
    RepeatedConditional:
      enabled: false
    ManualDispatch:
      enabled: false
    ControlParameter:
      enabled: false
  "app/jobs":
    DuplicateMethodCall:
      enabled: false
    TooManyStatements:
      enabled: false
    FeatureEnvy:
      enabled: false
  "app/models":
    DuplicateMethodCall:
      enabled: false
