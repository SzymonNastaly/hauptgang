---
detectors:
  IrresponsibleModule:
    enabled: false
  UncommunicativeModuleName:
    accept:
      - "V1"
  MissingSafeMethod:
    enabled: false
  UtilityFunction:
    enabled: false
  InstanceVariableAssumption:
    enabled: false
  NilCheck:
    enabled: false
  TooManyStatements:
    max_statements: 25
  ControlParameter:
    exclude:
      - "RecipeImporter#initialize"
      - "RecipeImporters::InstagramReelExtractor#initialize"
  DuplicateMethodCall:
    allow_calls:
      - "Rails.logger"
      - "error.message"
    exclude:
      - "ShoppingList::UpsertItems#call"
      - "ShoppingList::UpsertItems#upsert_item"
      - "RecipeImporter#build_http_client"
      - "RecipeImporter#import"
      - "RecipeImporters::InstagramReelExtractor#build_http_client"
      - "RecipeImporters::JsonLdExtractor#find_recipe"
  LongParameterList:
    exclude:
      - "ShoppingList::UpsertItems#upsert_item"
  FeatureEnvy:
    exclude:
      - "ShoppingList::UpsertItems#upsert_item"
      - "RecipeImporter#sanitized_url"
      - "RecipeImporters::InstagramReelExtractor#sanitized_url"
      - "Llm::RecipeExtraction#build_result"
      - "RecipeImporters::JsonLdExtractor#extract_instructions"
      - "RecipeImporters::JsonLdExtractor#find_recipe"
      - "RecipeImporters::LlmExtractor#clean_html"
  RepeatedConditional:
    exclude:
      - "RecipeImporters::JsonLdExtractor"

directories:
  "app/controllers":
    DuplicateMethodCall:
      enabled: false
    TooManyStatements:
      enabled: false
    TooManyInstanceVariables:
      enabled: false
    TooManyMethods:
      enabled: false
    FeatureEnvy:
      enabled: false
    RepeatedConditional:
      enabled: false
    ManualDispatch:
      enabled: false
    ControlParameter:
      enabled: false
  "app/jobs":
    DuplicateMethodCall:
      enabled: false
    TooManyStatements:
      enabled: false
    FeatureEnvy:
      enabled: false
  "app/models":
    DuplicateMethodCall:
      enabled: false
  "db/migrate":
    FeatureEnvy:
      enabled: false
    UncommunicativeVariableName:
      enabled: false
    DuplicateMethodCall:
      enabled: false
  "test":
    TooManyInstanceVariables:
      enabled: false
    UncommunicativeVariableName:
      enabled: false
    ControlParameter:
      enabled: false
    LongParameterList:
      enabled: false
    FeatureEnvy:
      enabled: false
